<!-- confirmation.component.html -->
<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4" *ngIf="isVisible">
    <div class="bg-white rounded-lg shadow-md p-8 text-center max-w-md w-full">
      <div class="mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      
      <h1 class="text-2xl font-bold text-gray-800 mb-2">Thank You!</h1>
      
      <p class="text-gray-600 mb-4">
        Your details has been successfully<br>
        submitted. Thanks!
      </p>
      
      <button 
        class="mt-6 px-6 py-2 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors"
        (click)="closePopup()">
        Continue
      </button>
    </div>
  </div>
