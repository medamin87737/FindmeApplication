<body>
<div class="mission-form-container">
  <button class="ios-close-button" routerLink="/dashboard">
    <span class="ios-close-icon"></span>
  </button>
  <h2 class="form-title">Publier une mission</h2>
  <div class="logo-container">
    <label class="image-upload-label" for="imageInput">
      <img
        [src]="job.image || 'assets/placeholder-profile.png'"
        alt="Mission Logo"
        class="mission-logo"
      />
      <input
        type="file"
        id="imageInput"
        accept="image/*"
        (change)="onImageUpload($event)"
        hidden
      />
      <div class="upload-overlay">
        <span class="upload-text">Ajouter une image</span>
      </div>
    </label>
  </div>

  <form class="mission-form" autocomplete="off">
    <div class="form-group">
      <input
        type="text"
        class="form-control"
        placeholder="Intitulé du mission"
        [(ngModel)]="job.title"
        name="title"
        (ngModelChange)="updateJob()"
      />
    </div>
    <div class="form-row">
      <div class="form-group">
        <input
          type="date"
          class="form-control"
          placeholder="Date de début"
          [(ngModel)]="job.startDate"
          name="startDate"
          (ngModelChange)="updateJob()"
        />
      </div>
      <div class="form-group">
        <input
          type="date"
          class="form-control"
          placeholder="Date de fin"
          [(ngModel)]="job.endDate"
          name="endDate"
          (ngModelChange)="updateJob()"
        />
      </div>
    </div>
    <div class="form-group">
      <input
        type="text"
        class="form-control"
        placeholder="Poste"
        [(ngModel)]="job.position"
        name="position"
        (ngModelChange)="updateJob()"
      />
    </div>
    <div class="form-row">
      <div class="form-group">
        <input
          type="text"
          class="form-control"
          placeholder="Langue"
          [(ngModel)]="job.language"
          name="language"
          (ngModelChange)="updateJob()"
        />
      </div>
      <div class="form-group">
        <input
          type="text"
          class="form-control"
          placeholder="Lieu de travail"
          [(ngModel)]="job.location"
          name="location"
          (ngModelChange)="updateJob()"
        />
      </div>
    </div>
    <div class="form-group">
      <select
        class="form-control"
        [(ngModel)]="job.workType"
        name="workType"
        (ngModelChange)="updateJob()"
      >
        <option value="" disabled selected>Sur site | hybride | à distance</option>
        <option *ngFor="let type of workTypes" [value]="type">
          {{ type === 'on-site' ? 'Sur site' : (type === 'hybrid' ? 'Hybride' : 'À distance') }}
        </option>
      </select>
    </div>
    <button type="button" class="submit-btn" routerLink="/etape2-mission">Commencez</button>
  </form>
</div>
</body>
