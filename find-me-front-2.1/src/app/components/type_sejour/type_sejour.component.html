<div class="upload-documents-container">
  <div class="upload-section">
    <h2>Importer Vos {{ text }}</h2>

    <div class="upload-box">
      <div class="upload-content">
        <i class="fas fa-file-pdf fa-4x mb-4 text-purple-600"></i>

        <div class="file-select-area">
          <!-- No file selected -->
          <ng-container *ngIf="!externalFiles || externalFiles.length === 0">
            <i class="fas fa-plus fa-3x" (click)="diplomaInput.click()"></i>
            <p>
              <a class="browse-link" (click)="diplomaInput.click()">Choisir un document</a>
            </p>
          </ng-container>
          <!-- Files selected -->
          <div *ngIf="externalFiles && externalFiles.length > 0">
            <div *ngFor="let file of externalFiles; let i = index" class="file-item">
              <p>
                Fichier {{ i + 1 }}: {{ file.name }}
                <button
                  type="button"
                  class="delete-file-btn"
                  (click)="removeFile(i)"
                  aria-label="Supprimer fichier"
                >
                  &times;
                </button>
              </p>
            </div>
            <i class="fas fa-plus fa-3x" (click)="diplomaInput.click()"></i>
          </div>

          <!-- Hidden file input -->
          <input
            type="file"
            accept=".pdf"
            multiple
            style="display: none"
            (change)="onFileSelected($event)"
            #diplomaInput
          />
        </div>

        <p class="format-info">Formats acceptés : PDF.</p>
      </div>

      <button class="upload-button" (click)="onUpload()">ENREGISTRER VOS DOCUMENTS</button>
    </div>
  </div>

  <!-- Pop-up message -->
  <div *ngIf="popupMessage" class="popup" [ngClass]="popupType" style="margin-top: 68px;">
    {{ popupMessage }}
  </div>
</div>
