<div class="flex justify-center items-center h-screen">
    <div class="flex justify-center items-center w-full">

        <div class="bg-white rounded-lg shadow-xl p-9 w-96 login ml-8 formlogin" >
            <h2 class="text-2xl font-semibold mb-8 text-center text-gray-700">Se connecter</h2>

            <form [formGroup]="login" (ngSubmit)="onSubmit()">
                <div class="mb-8">
                    <input type="email" formControlName="email" placeholder="Email"
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-100 bg-[#F0EFFF] text-[#A7A3FF] placeholder:text-[#A7A3FF] text-sm"
                        [ngClass]="{'border-red-500': login.get('email')?.invalid && (login.get('email')?.dirty || login.get('email')?.touched)}">
                    <div *ngIf="login.get('email')?.invalid && (login.get('email')?.dirty || login.get('email')?.touched)"
                        class="text-red-500 text-sm mt-1">Please enter a valid email.</div>
                </div>

                <div class="mb-2">
                    <div class="relative">
                        <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Mot de passe"
                            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-100 bg-[#F0EFFF] text-[#A7A3FF] placeholder:text-[#A7A3FF] text-sm"
                            [ngClass]="{'border-red-500': login.get('password')?.invalid && (login.get('password')?.dirty || login.get('password')?.touched)}">
                        <button type="button" class="absolute inset-y-0 right-0 px-4 py-2 focus:outline-none"
                            (click)="togglePasswordVisibility()">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-5 h-5 text-gray-400">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                            </svg>
                        </button>
                    </div>
                    <div *ngIf="login.get('password')?.invalid && (login.get('password')?.dirty || login.get('password')?.touched)"
                        class="text-red-500 text-sm mt-1">Password is required.</div>
                </div>

                <div class="flex items-center justify-end mb-5">
                    <div>

                        <a href="/mot-de-passe-oublier" class="text-xs text-blue-500 hover:underline">Mot de passe oublié ?</a>
                    </div>
                </div>

                <div *ngIf="authErrorMessage" class="text-red-600 font-semibold mb-1 text-xs">
                    {{ authErrorMessage }}
                  </div>
                  
                  
                  <button 
                    class="bg-[#7367F0] hover:bg-[#5A50D7] text-white font-bold py-2 px-4 rounded-lg w-full shadow-md">
                    Se connecter
                  </button>
                  
            
            </form>

            
        </div>
    </div>
</div>
