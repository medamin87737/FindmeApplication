<div class="flex flex-col min-h-screen items-center justify-center bg-gray-50 px-4 sm:px-8">
  
  <!-- Image and Form Container -->
  <div class="flex flex-col lg:flex-row items-center lg:items-stretch lg:justify-center w-full max-w-5xl space-y-6 lg:space-y-0 lg:space-x-16">
    
    <!-- Left Side (Bigger Image) -->
    <div class="flex justify-center w-full lg:w-3/6">
      <img
        src="assets/images/Page_Register/Register_Image.png"
        alt="Hiring Illustration"
        class="w-full h-auto max-h-[500px] object-cover"
      />
    </div>

    <!-- Right Side (Reset Password Form) -->
    <div class="border-t-4 border-blue-500 bg-white rounded-lg shadow-xl p-6 sm:p-8 w-full lg:w-3/6 flex items-center">
      <div class="w-full">
        <h2 class="text-xl font-semibold text-center text-gray-800 mb-6">Réinitialiser le mot de passe</h2>

        <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">
          <!-- Password Field -->
          <div class="mb-4 relative">
            <label for="password" class="block text-gray-700 text-sm font-bold mb-2">Mot de passe</label>
            <div class="relative">
              <input
                [type]="passwordVisible ? 'text' : 'password'"
                id="password"
                formControlName="password"
                placeholder="Mot de passe"
                class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline placeholder-gray-400"
                [ngClass]="{'border-red-500': resetPasswordForm.get('password')?.invalid && resetPasswordForm.get('password')?.touched}"
              />
              <!-- Eye Button -->
              <button type="button" (click)="togglePasswordVisibility()" class="absolute inset-y-0 right-3 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                  stroke="currentColor" class="w-5 h-5 text-gray-500">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
              </button>
            </div>
            <div *ngIf="resetPasswordForm.get('password')?.invalid && resetPasswordForm.get('password')?.touched" class="text-red-500 text-xs italic mt-1">
              <div *ngIf="resetPasswordForm.get('password')?.errors?.['required']">Mot de passe requis.</div>
              <div *ngIf="resetPasswordForm.get('password')?.errors?.['minlength']">Le mot de passe doit contenir au moins 6 caractères.</div>
            </div>
          </div>

          <!-- Confirm Password Field -->
          <div class="mb-4 relative">
            <label for="confirmPassword" class="block text-gray-700 text-sm font-bold mb-2">
              Confirmer Mot de passe
            </label>
            
            <div class="relative">
              <input
                [type]="confirmPasswordVisible ? 'text' : 'password'"
                id="confirmPassword"
                formControlName="confirmPassword"
                placeholder="Confirmer Mot de passe"
                class="shadow appearance-none border rounded w-full py-2 px-3 pr-10 text-gray-700 leading-tight focus:outline-none focus:shadow-outline placeholder-gray-400"
                [ngClass]="{'border-red-500': resetPasswordForm.get('confirmPassword')?.invalid && resetPasswordForm.get('confirmPassword')?.touched}"
              />
              
              <!-- Eye Button -->
              <button type="button" (click)="toggleConfirmPasswordVisibility()" class="absolute inset-y-0 right-3 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                  stroke="currentColor" class="w-5 h-5 text-gray-500">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
              </button>
            </div>
            
            <!-- Error Message -->
            <div *ngIf="resetPasswordForm.get('confirmPassword')?.invalid && resetPasswordForm.get('confirmPassword')?.touched" class="text-red-500 text-xs italic mt-1">
              <div *ngIf="resetPasswordForm.get('confirmPassword')?.errors?.['required']">Confirmation du mot de passe requise.</div>
              <div *ngIf="resetPasswordForm.get('confirmPassword')?.errors?.['passwordMismatch']">Les mots de passe ne correspondent pas.</div>
            </div>
          </div>
        <!-- Display Messages -->
        <div class="flex flex-col items-center mb-4">
          <div *ngIf="successMessage" class="text-green-500 text-sm mb-2">
            {{ successMessage }}
          </div>
          <div *ngIf="errorMessage" class="text-red-500 text-sm mb-2">
            {{ errorMessage }}
          </div>
        </div>
          <!-- Submit Button -->
          <div class="flex items-center justify-center">
            <button
              type="submit"
              class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
              [disabled]="resetPasswordForm.invalid"
            >
              Confirmer
            </button>
          </div>
        </form>
        <app-CompteCreerWithSucess *ngIf="showPopup" (close)="closePopup()" [successMessage]="'Mot de passe réinitialisé avec succès.'"></app-CompteCreerWithSucess>

      </div>
    </div>

  </div>
</div>
