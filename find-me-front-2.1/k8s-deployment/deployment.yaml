apiVersion: apps/v1
kind: Deployment
metadata:
  name: findme-front-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: findme-front
  template:
    metadata:
      labels:
        app: findme-front
    spec:
      containers:
        - name: findme-front-container
          image: depot.dpc.com.tn:8443/find-me-pfe/findme-front-dev:V-0.0.49
          ports:
            - containerPort: 80


---


apiVersion: v1
kind: Service
metadata:
  name: findme-front
spec:
  selector:
    app: findme-front
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer


---


apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: findme-front
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/enable-websockets: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
  - host: dev.find-me-2.1.dpc.com.tn
    http:
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: findme-front
              port:
                number: 80
        - path: /ws/
          pathType: Prefix
          backend:
            service:
              name: findme-front
              port:
                number: 80
  tls:
    - hosts:
        - dev.find-me-2.1.dpc.com.tn
      secretName: findme-front-tls
